body:
  text: 鬻子雜家類一雜學之屬提要臣等謹案鬻子一卷舊本題周鬻熊撰崇文總目作十四篇髙似孫子畧作十二篇陳振孫書録解題稱陸佃所校十五篇此本題唐逢行珪注凡十四篇葢即崇文總目所著録也考漢書藝文志道家鬻子二十二篇又小説家鬻子説十九篇是當時本有二書列子引鬻子凡三條皆黄老清靜之説與今本不類疑即道家二十二篇之文今本所載與賈誼新書所引六條文格畧同疑即小説家之鬻子説也杜預左傳注稱鬻熊為祝融十二世孫孔頴達疏謂不知出何書史記載鬻熊子事文王早卒其子曰熊麗熊麗生熊狂熊狂生熊繹成王時舉文武勤勞之後嗣受封於楚漢書載魏相奏記霍光稱文王見鬻子年九十餘雖所説小異然大約文武時人今其書乃有昔者魯周公語又有昔者魯周公使康叔往守于殷語而賈誼新書亦引其成王問荅凡五條時代殊不相及劉勰文心雕龍云鬻熊知道文王諮詢遺文餘事録為鬻子則裒輯成編不出熊手流傳附益或構虚詞故漢志别入小説家歟獨是偽四八目一書見北齊陽休之序録凡古来帝王佐輔有數可紀者靡不具載而此書所列禹七大夫臯陶杜子業既子施子黯季子甯然子堪輕子玉湯七大夫慶輔伊尹湟里且東門蝡南門蜧西門疪北門側皆具有姓名獨不見收似乎六朝之末尚無此本或唐以来好事之流依仿賈誼所引撰為贋本亦未可知觀其標題甲乙故為佚脱錯亂之狀而誼書所引則無一條之偶合豈非有心相避而巧匿其文使讀者互相檢驗生其信心歟且其篇名冗贅古無此體又每篇寥寥數言詞㫖膚淺决非三代舊文姑以流傳既久存備一家耳卷首有逢行珪序及永徽四年進書表自署華州鄭縣尉其里居則未詳云乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀鬻子原序鬻子名熊楚人周文王之師也年九十見文王王曰老矣鬻子曰使臣捕獸逐麋已老矣使臣坐策國事尚少也文王師之著書二十二篇名曰鬻子子者男子之美稱賢不逮聖不以為經用題紀標子同據劉氏九流即道流也遭秦暴亂書記畧盡鬻子雖不預焚燒編帙由此殘缺依漢書藝文志惟有六篇今此本乃有十四篇未詳孰是篇或錯亂文多遺闕至敷演大道銓撰明史闡域中之教化論刑徳之是非雖卷軸不全而其門可見然鄧林之枝荆山之玉君子餘文可得觀矣鬻子博懐道徳善謀政事故使周文屈節大聖諮詢情存帝王之道辭多斥救之要理致通逺旨趣恢𢎞實先達之奥言為諸子之首唱織組仁義經緯家邦垂勸誡之風陳𢎞濟之術王者覽之可以理國吏者遵之可以從政足使賢者勵志不肖者滌心語曰詩三百一言以蔽之曰思無邪言而不朽可為龜鏡鬻子論道無邪之謂歟幸以休務之隙披閲子史而書籍實繁不能精備至於此子頗復留心尋其力迹之端探其闡教之㫖豈如寓言迂恢馳術飛辯者矣亦乃字重千金辭髙萬禩聊為注解畧起指歸馳心於萬古之上寄懐於千載之下庶垂道見志懸諸日月将来君子幸無忽焉進鬻子表臣行珪言臣聞結繩以往書疏蔑然文字之初教義斯起記言之史設褒貶之迹聿興書事之官置勸戒之門由啟於是國版稠疊謨訓昭彰唱讃之道以𢎞闡揚之理兹暢徳業彌縟英華日新雕琢性情振其徽烈逮乎周文傳聖鬻子稱賢意合道同實申師傅鬻子以文王降已大啟心期明宣布政之方廣立輔成之筞足使萬機留想一代咸休稽古有宗發明耳目尋其著述之㫖探其斥救之辭莫不原道心以裁章研神理而啟沃彌綸彜訓經緯區中不徒讃說微言務於遺翰而已鬻熊為諸子之首文王則聖徳之宗熊既文王之師書乃政教之體雖篇軸殘缺提舉猶備紀綱譬彼盤盂發揚有愈臣家傳儒素積習忠良覩明主奉師之蹤覧賢者盡義之道循環徵究妙極機神敢率至愚為之注解研覃析理以叙私情剪截浮辭用申狂瞽伏惟陛下則天垂訓越極宣風稽太上之至和興帝王之炯誡股肱諒直獻替無疑大舉賢良寧濟區宇四海革面八表宅心務本修文垂拱無事臣以草莱卑賤識度庸淺荷堯沐舜擊壤謳歌周施政教之端屬聽太平之詠志存綴輯以述矢言簡牘難周辭意斯拙謹以繕冩奉獻闕庭庶日月昭明布餘暉於漏隙時雨咸泊灑餘潤於纎枯望報塵露之資豈議沉舟之楫天威咫尺神魄震驚謹上表以聞伏聽慈㫖謹言永徽四年十一月二十六日華州鄭縣尉臣逄行珪上
