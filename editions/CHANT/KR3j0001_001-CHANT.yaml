body:
  text: 卷上鬻子卷上撰吏五帝三王傳政乙第五撰吏五帝三王傳政乙第五政曰君子不與人謀之則已矣若與人謀之則非道無由也故君子之謀能必用道而不能必見受能必忠而不能必入能必信而能必見信君子非人者不出之於辭而施之於行故非非者行是惡惡者行善而道諭矣大道文王問第八大道文王問第八政曰昔者文王問於鬻子敢問人有大忘乎對曰有文王曰敢問大忘奈何鬻子曰知其身之惡而不改也以賊其身乃喪其軀其行如此是謂之大忘貴道五帝三王周政乙第五貴道五帝三王周政乙第五昔之帝王所以為明者以其吏也昔之君子其所以為功者以其民也力生於神而功最於吏福歸於君昔者五帝之治天下也其道昭昭若日月之明然若以晝代夜然故其道首首然萬世為福萬世為教者唯從黃帝以下舜禹以上而已矣君王欲緣五帝之道而不失則可以長久守道五帝三王周政甲第四守道五帝三王周政甲第四聖人在上賢士百里而有一人則猶無有也王道衰微暴亂在上賢士千里而有一人則猶比肩也撰吏五帝三王傳政乙第三撰吏五帝三王傳政乙第三故曰民者賢不肖之杖也賢不肖皆具焉故賢人得焉不肖人休焉杖能側焉忠信飾焉民者積愚也雖愚明主撰吏焉必使民興焉士民與之明上舉之士民苦之明上去之故王者取吏不忘必使民唱然後和民者吏之程也察吏於民然後隨政曰民者至卑也而使之取吏焉必取所愛故十人愛之則十人之吏也百人愛之則百人之吏也千人愛之則千人之吏也萬人愛之則萬人之吏也故萬人之吏撰卿相矣卿相者諸侯之丞也故封侯之土秩出焉卿相者侯之本也
