  - {type: variant, offset: 60, length: 0, content: '', WYG: 君子終日言之而不離體要謀於政事而咸由於道故同於道者道亦得之非道之言君子不用也}
  - {type: variant, offset: 60, length: 0, content: '', krp: 君子終日言之而不離體要謀於政事而咸由於道故同於道者道亦得之非道之言君子不用也}
