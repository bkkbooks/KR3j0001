  - {type: variant, offset: 581, length: 0, content: '', krp: 政之興亡在於卿相得賢者和輯失賢者妬散故為侯之職在卿相也曲阜魯周公政甲第十四曲阜之地方七百里少昊之墟是魯周公所封之邑以周公禆益政禮故稱之以為篇耳政曰昔者魯周公曰吾聞之於政也稱周公之言以明政者也知善不行者謂之狂善者體道懐徳也人主行善於上百姓變善於下堯之日比屋可封知善道之為善而不行用者是狂悖之人也知惡不改者謂之惑惡者賊以喪軀人主為惡於上則百姓為惡而不悛者是昏惑之人也夫狂與惑者聖王之戒也知善而不行知惡而不改必至狂惑者此聖王之明戒也道符五帝三王傳政甲第二夫開國崇基必先於道道既符合無往不真影響相同自然合應甲者先於乙也不肖者不自謂不肖也肖者類也言不類不似也自知賢不肖是為明也不似之人豈自稱哉言不知也而不肖見於行丹朱傲虐無捨晝夜頟頟肆惡曽無休息此則見於外不以隠㣲者也雖自謂賢人猶謂之不肖也不肖者豈自謂不肖哉以賢者視之不肖之迹見矣雖以彼賢以自賢人豈以為賢乎愚者不自謂愚而愚見於言昧道不徳之人豈自稱其愚䝉哉而愚迹見於辭説也雖自謂智人猶謂之愚愚者豈自以為愚哉以智視之愚迹見矣雖以彼智以自智人豈以為智乎數始五帝治天下第七言帝者年數之始以記其佐帝及升位之年數也天下者豈可忘理哉亦由積徳累業以有之也言五帝之道相緣為政故同稱之也昔者帝顓頊黄帝正妃曰嫘祖生昌意昌意生顓頊為髙陽氏在位七十八年年十五而佐黄帝軒轅氏少昊次子父曰帝鴻氏母曰附寳見大電光繞北斗樞星照野感而孕二十四月生以土徳王故曰黄帝在位百年顓頊自幼年以翼佐黄帝也二十而治天下升為天子也其治天下也上緣黄帝之道而行之因修黄帝之道而行其政令不改革也學黄帝之道而常之比迹不及所以效也效其通道而常用之昔者帝嚳黄帝正妃生𤣥囂𤣥囂之子生帝嚳徳日新故曰髙辛在位七十上賓年十五而佐帝顓頊三十而治天下佐顓頊以理天下三十而升為帝也其治天下也上緣黄帝之道而明之言徳稍下不能盡行黄帝之道但明之而已矣學帝顓頊之道而行之政教所為效顓頊而行其言不能常習之也禹政第六伯禹夏后氏言禹功錫𤣥圭徳諧元始仁賢立政以致太平可為法則故以名篇矣禹之治天下也黄帝𤣥孫祖顓頊姓姒名文命字髙宻在位九年受禪成功曰禹受舜禪以臨天下得臯陶得杜子業得既子得施子黯得季子寗得然子堪得輕子玉此以上七大夫之姓名也得七大夫以佐其身以治天下而天下治言帝王獨治天下雖則聖徳皆俟賢佐以輔之故得天下乂安也湯政天下至紂第七言成湯放無道之桀以統萬機而理天下得賢大夫贊佐而致太平至紂昏惑以失國故終始書之以名篇湯之治天下也湯姓子名履字天乙除虐去殘曰湯征葛伯放桀順取天下以理也得慶輔伊尹湟里且東門蝡南門蜧西門疪北門側伊尹有莘氏媵臣以為相東門等並姓名也得七大夫佐以治天下而天下治七大夫皆有賢行斥救弼諧故得天下咸乂也二十七世自湯至紂父子兄弟相承二十七代也積歳五百七十六嵗至紂夏曰嵗此除即位之年也上禹政第六以五聲聽政克勤于邦可以為上也禹之治天下也以五聲聴九重幽深下言難達所欲百姓反斥救之事故懸置五聲招之以聽政也門懸鐘鼔鐸磬懸之於簨簴也而置鞀置於地也以得四海之士四海之士有進其言者必造五聲以揮撃傳聞也為銘於簨簴懸樂器之具刻銘於其上也曰教寡人以道者撃鼓鼓以動物故動合於道也教寡人以義者撃鐘鐘金聲也以合於義故教義者撃鐘也教寡人以事者振鐸鐸金鈴木舌也所以事務有可行為所欲言者以振鐸也語寡人以憂者撃磬憂者聲悲磬聲消燥而近於悲故憂而撃磬也教寡人以獄訟者揮鞀此之謂五聲獄訟之事務於疾速故揮鞀以陳之此以上並銘於簨簴之大也是以禹嘗據一饋而七十起日中而不暇飽食急於政事無暇安於一食所以示接士之急也曰吾猶恐四海之士留於道路常行之處非所宜留也是以四海之士皆至事必得道必合上下應㑹無不至也是以禹當朝廷間也可以羅爵不暇飽食聽政不疲朝廷閒静然後無事也道符五帝三王傳政甲第五夫君子将入其職旭旭然如日初出光昭昭然人保其福既去暗暗然人失其教此得政典符合之謂也夫國者卿相世賢者有之有國則有卿相賢徳者卿相之具人與之王用之不賢者豈能用之哉有國無國智者治之夫有國者豈自寧豈自亂也所以安者智謀之力也智者非一日之志積功累業行道不倦以成其志治者非一日之謀謀者心思也樹徳以為尚寛重道修政作教以至誠平之咨謀非一日之所能致也治志治謀在於帝王然後民知所保夫君上有道化行於下逺近慕義四境無虞百姓淳和盗賊屏息故人知所安也而知所避富貴貧賤不相犯仁義禮智由其門無違政教下民為福是知所避也發教施令為天下福者謂之道先之以博愛陳之以徳義先之以敬讓道之以禮樂不奪民時不干民利故得禍亂不作為福之道此之謂歟上下相親謂之和至徳以教之要道以治之上下同心是謂和矣民不求而得所欲謂之信日出而作日沒而息不勞於事不苦煩苛甘其食安其居樂其業此豈外求之哉上有行道之君是所致者可謂之大信矣除去天下之害謂之仁兼愛萬物慈惻外施至若成湯征葛伯放桀於南巢夏禹之别導山川置立州國故得天下免於暴亂百姓宅其所居仁逺乎哉斯仁至也仁與信和與道帝王之器此四者帝王有天下之器所以樂用也茍有違之而天下離叛非其所有也凡萬物皆有器所用利之是以為器而違其用豈得其器哉故欲有為不行其器者雖欲有為不成惟名與器不可假人其所營為必以其器用得其用也故違之不行其器於利逺矣豈有成哉諸侯之欲王者亦然不用帝王之器者不成言天下之大神器之重非其王者難以處王之器而未可以宰割必行仁與信和與道然後可招懐萬姓奄有四維西伯以敬讓興邦南陽以仁道得政非其人也豈妄成之哉湯政湯治天下理第七天地設而萬物生隂陽化而四時定分則統理為政之方極於始終可成法則也天地闢而萬物生乾其静也專一其動也正直坤其静也翕斂其動也開闢是以廣大而生萬物也萬物生而人為政焉政也者所以正於天地也言天地生萬物不能相使不能相制須人以為政以正之無其政也則萬物不理也物不能生而無殺也言天地能生而不能無殺唯天地之所以殺人不能生天之能生唯天殺之可也夫唯天殺之人豈生之哉是不能生之也人化而為善萬物之中人其為貴化而為善理亦天常也獸化而為惡禀氣以生不有知識非人之類豈不惡哉人而不善者謂之獸人化而為善是為天常今為不善者與彼飛虚渡實亦何以異矣有天然後有地天在於上地在於下先天後地理亦自然有地然後有别三才克定萬物區别有别然後有義夫婦之義著君臣之義彰也有義然後有教百官立政教行父子存家設教所以效達於上也有教然後有道教迹既彰約之以道苛乖其道物無以安有道然後有理事名各立而理自存有理然後有數名理既彰數統之矣夫數以一終十乃至千萬九九之數天之運度亦數之義也日有冥有旦有晝有夜然後以為數天有三百六十度一日一度三百六十日一周天一日之中晝夜百刻以定之為數也月一盈一虧月合月離以數紀一嵗之中有十二月一月有盈有虧日月或合於次或離於次終於一嵗日窮於次月窮於紀星迴於天數将㡬終此則日月星辰運行至十二月皆周匝於故處紀猶㑹者也四者皆陳以為數治春夏秋冬各統於一嵗之日月也此以上為政之道當法則也政者衛也始終之謂衛政者正也所以正理天下以為之天周衛始化之終安之無得之也慎誅魯周公第六刑法有倫宜於時政好生之徳理適典章故明聖之資輔成周室誡勸之道所得稱言國之大經在於賞罰二者或替将何訓焉可為政先故紀之為篇目矣昔者此昔者往日之辭也魯周公使康叔往守於殷康叔周公母弟也衛三監之地殷人數叛故使賢以弟往也戒之曰與殺不辜寧失有罪人命所懸理須詳正夫刑或濫其何則焉故不可輕殺不辜寧可失於有罪此亦寛仁之道也無有無罪而見誅罰而不明雖刑不禁言罰必施於有罪也無有有功而不賞賞而不明雖賞不勸言賞必加於有功也戒之封重稱戒者所以示於殷勤封康叔名也誅賞之慎焉誅賞者國之柄也怒而加誅未必當罪喜而行賞未必當功賞僭則懼及於淫誅濫則懼及於善賞得其功則賢人以勸罰得其辜則姦人以息此不可不審慎之鬻子}
