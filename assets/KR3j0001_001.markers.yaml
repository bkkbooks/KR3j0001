  - {type: variant, offset: 299, length: 0, content: '', WYG: 首者始也言五帝之道常為萬代之始後之不能加也夫黄帝始垂衣裳造書契置史官為舟楫以濟不通服牛乗馬立棟宇重門擊柝以待暴客為杵臼以利萬姓作弧矢以威天下造律管興封禪顓頊平九黎之亂人神不雜萬物有序髙辛氏作鞉鞞鐘鼓莞席帝堯茅茨不剪土階三尺夏日葛衣冬日鹿裘蕩蕩乎民無能名焉巍巍乎其有成功也帝舜少而至孝堯聞聰明而用之舜乃舉禹為司空以平水土棄為后稷以播百穀卨為司徒以教百姓臯陶為士師以理獄訟垂為共工以典衆作伯益作朕虞以育草木伯夷為秩宗以典三禮夔為樂正以和神人舜彈五絃之琴歌南風之詩夏禹櫛風沐雨冠履不顧敷九土乗四載鑿龍門闢伊闕道百川建萬國微禹之功人皆魚矣帝王之功莫此為盛故百代不易為福為教也}
