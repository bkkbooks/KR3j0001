  - {type: variant, offset: 74, length: 0, content: '', WYG: 盡忠論道聖君必納庸主所難故有道之君上下親愛忠讜進用智術無隠以石投水何齟齬哉而不明之主君臣疏忌小人侍側端正棄遺諂佞是親忠信不用掩目而視豈不惑歟必忠言之不入也}
