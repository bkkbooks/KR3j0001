body:
  text: 卷下鬻子卷下曲阜魯周公政甲第十四曲阜魯周公政甲第十四政曰昔者魯周公曰吾聞之於政也知善不行者謂之狂知惡不改者謂之惑夫狂與惑者聖王之戒也道符五帝三王傳政甲第二道符五帝三王傳政甲第二不肖者不自謂不肖也而不肖見於行雖自謂賢人猶謂之不肖也愚者不自謂愚而愚見於言雖自謂智人猶謂之愚數始五帝治天下第七數始五帝治天下第七昔者帝顓頊年十五而佐黃帝二十而治天下其治天下也上緣黃帝之道而行之學黃帝之道而常之昔者帝嚳年十五而佐帝顓頊三十而治天下其治天下也上緣黃帝之道而明之學帝顓頊之道而行之禹政第六禹政第六禹之治天下也得皋陶得杜子業得既子得施子黯得季子甯得然子堪得輕子玉得七大夫以佐其身以治天下以天下治湯政天下至紂第七湯政天下至紂第七湯之治天下也得慶誧伊尹湟里且東門虛南門蝡西門疵北門側得七大夫佐以治天下而天下治二十七世積歲五百七十六歲至紂上禹政第六上禹政第六禹之治天下也以五聲聽門懸鐘鼓鐸磬而置鞀以得四海之士為銘於簨𧇽曰教寡人以道者擊鼓教寡人以義者擊鐘教寡人以事者振鐸語寡人以憂者擊磬語寡人以獄訟者揮鞀此之謂五聲是以禹嘗據一饋而七十起日中而不暇飽食曰吾猶恐四海之士留於道路是以四海之士皆至是以禹當朝廷間也可以羅爵道符五帝三王傳政甲第五道符五帝三王傳政甲第五夫國者卿相世賢者有之有國無國智者治之智者非一日之志治者非一日之謀而知所避發教施令為天下福者謂之道上下相親謂之和民不求而得所欲謂之信除去天下之害謂之仁仁與信和與道帝王之器凡萬物皆有器故欲有為不行其器者雖欲有為不成諸侯之欲王者亦然不用帝王之器者不成湯政湯治天下理第七湯政湯治天下理第七天地闢而萬物生萬物生而人為政焉無不能生而無殺也唯天地之所以殺人不能生人化而為善獸化而為惡人而不善者謂之獸有天然後有地有地然後有別有別然後有義有義然後有教有教然後有道有道然後有理有理然後有數曰有冥有旦有晝有夜然後以為數月一盈一虧月合月離以數紀四者皆陳以為數治政者衛也始終之謂衛慎誅魯周公第六慎誅魯周公第六昔者魯周公使康叔往守於殷戒之曰與殺不辜寧失有罪無有無罪而見誅無有有功而不賞戒之封誅賞之慎焉
